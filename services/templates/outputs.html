<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ComfyUI Outputs</title>
  <style>
    :root { --bg:#1e1e1e; --card:#282828; --text:#fff; --muted:#9ca3af; --accent:#fff; --border:#3a3a3a; }
    html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", Arial, sans-serif; }
    .wrap { max-width:900px; margin:0 auto; padding:40px 20px; }
    h1 { font-size:32px; font-weight:800; margin:0 0 8px; text-align:center; }
    .sub { margin:0 0 32px; color:var(--muted); text-align:center; }
    .back { color:var(--muted); text-decoration:none; font-size:14px; }
    .back:hover { color:var(--text); }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; }
    .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:20px; }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; background:rgba(255,255,255,.9); color:var(--bg); font-weight:700; border:2px solid rgba(255,255,255,.5); border-radius:8px; text-decoration:none; cursor:pointer; transition:all .2s; font-size:14px; }
    .btn:hover { background:var(--accent); border-color:var(--accent); }
    .count { color:var(--muted); font-size:14px; }
    table { width:100%; border-collapse:collapse; }
    td { padding:8px 4px; border-bottom:1px solid var(--border); font-size:14px; }
    td a { color:var(--accent); text-decoration:none; }
    td a:hover { text-decoration:underline; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a class="back" href="/">&larr; Back</a></p>
    <h1>ComfyUI Outputs</h1>
    <p class="sub"><span class="mono">{{ output_dir }}</span></p>

    <div class="card">
      <div class="toolbar">
        <a class="btn" href="/outputs/download-all">Download all as ZIP</a>
        <span class="count">{{ file_count }} file(s)</span>
      </div>
      <table>
        {{ file_rows }}
      </table>
    </div>
  </div>
</body>
</html>
