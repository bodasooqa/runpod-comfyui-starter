<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CivitAI LoRA Downloader</title>
  <style>
    :root { --bg:#1e1e1e; --card:#282828; --text:#fff; --muted:#9ca3af; --accent:#fff; --border:#3a3a3a; }
    html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", Arial, sans-serif; }
    .wrap { max-width:700px; margin:0 auto; padding:40px 20px; }
    h1 { font-size:32px; font-weight:800; margin:0 0 8px; text-align:center; }
    .sub { margin:0 0 32px; color:var(--muted); text-align:center; }
    .back { color:var(--muted); text-decoration:none; font-size:14px; }
    .back:hover { color:var(--text); }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; }
    .row { display:grid; grid-template-columns:160px 1fr; gap:16px; align-items:center; margin:16px 0; }
    input[type=text], input[type=password] { width:100%; padding:12px 16px; background:#1a1a1a; border:1px solid var(--border); color:var(--text); border-radius:8px; box-sizing:border-box; }
    .hint { background:#1a1a1a; border:1px dashed var(--border); padding:16px; border-radius:8px; margin-bottom:20px; font-size:14px; color:var(--muted); line-height:1.6; }
    .hint a { color:#4a9eff; }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 20px; background:rgba(255,255,255,.9); color:var(--bg); font-weight:700; border:2px solid rgba(255,255,255,.5); border-radius:8px; cursor:pointer; transition:all .2s; }
    .btn:hover { background:var(--accent); border-color:var(--accent); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .result { white-space:pre-wrap; background:#1a1a1a; border:1px solid var(--border); padding:16px; border-radius:8px; margin-top:20px; min-height:24px; }
    .progress { margin-top:20px; }
    .progress-bar { width:100%; height:8px; background:#1a1a1a; border:1px solid var(--border); border-radius:4px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s; }
    .progress-text { margin-top:8px; color:var(--muted); font-size:14px; text-align:center; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a class="back" href="/">&larr; Back</a></p>
    <h1>CivitAI LoRA Downloader</h1>
    <p class="sub">Downloads to <span class="mono">/workspace/runpod-slim/ComfyUI/models/loras</span></p>

    <div class="card">
      <div class="hint">
        <b>How to get an API token:</b> Create one at
        <a href="https://civitai.com/user/account" target="_blank">civitai.com/user/account</a>.
      </div>
      <form id="civitai-form" action="/civitai/download" method="post">
        <div class="row">
          <label for="civ_token">API Token</label>
          <input id="civ_token" type="password" name="token" placeholder="Paste your CivitAI token" required>
        </div>
        <div class="row">
          <label for="civ_url">Model URL</label>
          <input id="civ_url" type="text" name="url" placeholder="https://civitai.com/models/123456 or API URL" required>
        </div>
        <div style="margin-top:16px;">
          <button class="btn" type="submit" id="civ-btn">Download LoRA</button>
        </div>
      </form>
      <div class="result" id="civ-result"></div>
      <div class="progress" id="civ-progress" style="display:none;">
        <div class="progress-bar"><div class="progress-fill" id="civ-progress-fill"></div></div>
        <div class="progress-text" id="civ-progress-text">Downloading...</div>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
  <script>
    submitAsync(
      document.getElementById('civitai-form'),
      document.getElementById('civ-result'),
      document.getElementById('civ-progress'),
      document.getElementById('civ-progress-fill'),
      document.getElementById('civ-progress-text'),
      document.getElementById('civ-btn'),
      'Download LoRA',
      '/civitai'
    );
  </script>
</body>
</html>
